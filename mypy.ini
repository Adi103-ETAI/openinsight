[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
no_implicit_optional = True
strict_optional = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
ignore_missing_imports = True
exclude = (?x)(
    tests/
    | notebooks/
    | src/ingestion/llamaindex_integration.py
    | src/tools/
  )

# Per-module strictness — start strict on API routes and DeepInsights,
# expand coverage incrementally. The two bugs fixed in Phase 0.1
# (orchestrator.process() signature mismatch + missing Response import)
# would have been caught by these rules.
[mypy-src.api.routes.*]
disallow_untyped_defs = True
warn_return_any = True

[mypy-src.query.deepinsight.*]
disallow_untyped_defs = True
warn_return_any = True

# Third-party libs without stubs — ignore
[mypy-pymilvus.*]
ignore_missing_imports = True

[mypy-bio.*]
ignore_missing_imports = True

[mypy-scispacy.*]
ignore_missing_imports = True

[mypy-spacy.*]
ignore_missing_imports = True

[mypy-pdfplumber.*]
ignore_missing_imports = True

[mypy-loguru.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True
