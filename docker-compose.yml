services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openmed_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: openmed_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: openmed
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: openmed_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  mongo_data:
  redis_data:
