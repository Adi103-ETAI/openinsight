services:
  mongodb:
    image: mongo:7
    container_name: openinsight_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: openinsight
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: openinsight_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  grobid:
    image: lfoppiano/grobid:0.8.0
    container_name: openinsight_grobid
    ports:
      - "8070:8070"
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xmx4g

  # ── Milvus Standalone (local vector DB) ──────────────────────────────────
  # For Zilliz Cloud: comment out etcd, minio, and milvus below and set
  # VECTOR_URI / VECTOR_TOKEN in .env instead.
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: openinsight_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: openinsight_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: openinsight_milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
